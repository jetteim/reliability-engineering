source_prompt: tests/scenarios/checkout-reliability.prompt.md
expected_artifacts:
  - ServiceReliabilityProfile
  - SliSloDefinition
  - ReliabilityRecommendationSet
  - IncidentLearningPlan
  - ResilienceExperimentPlan
  - SreRulesGenerationPlan
  - ProviderGenerationHandoff
  - VerificationEvidence
required_contents:
  ServiceReliabilityProfile:
    service: checkout-api
    reliability_boundary: user-checkout
    critical_user_journeys:
      - submit-cart-to-paid-order
    dependencies:
      - payment-provider
      - inventory-service
    known_failure_modes:
      - payment-provider failure
      - inventory timeout
      - malformed cart payload
  SliSloDefinition:
    slis:
      checkout_success_ratio:
        good_events: paid orders
        total_events: checkout attempts
      checkout_latency:
        threshold: 2s
    slo:
      objective: 99.5% successful checkout attempts over 28d
    miss_policy:
      trigger: error budget exhausted or projected exhaustion before window end
      actions:
        - pause risky checkout deploys
        - run reliability review before feature expansion
  ReliabilityRecommendationSet:
    recommendations:
      - define checkout success SLI from objective ratios
      - add dependency-failure runbook and ownership
      - hand off missing telemetry to observability-engineering
  IncidentLearningPlan:
    incident_inputs:
      - deploy events
      - on-call notes
      - customer impact
    outputs:
      - postmortem
      - action items
      - reliability model update
  ResilienceExperimentPlan:
    experiments:
      payment_provider_error_injection:
        failure: bounded payment-provider errors
        safeguards:
          - production blast radius limit
          - rollback switch
      inventory_timeout_jitter:
        failure: bounded timeout and jitter
  SreRulesGenerationPlan:
    generator: sre-rules
    engine: slo-rules-engine
    source_definition: examples/services/checkout.rb
    review_gate:
      - bin/rules-ctl validate examples/services/checkout.rb
      - bin/rules-ctl model-report examples/services/checkout.rb
    provider_targets:
      supported:
        - datadog
        - prometheus_stack
        - sloth
      unsupported:
        - elastic
    generation_commands:
      - bin/rules-ctl generate --provider datadog examples/services/checkout.rb
      - bin/rules-ctl generate --provider prometheus_stack examples/services/checkout.rb
      - bin/rules-ctl generate --provider sloth examples/services/checkout.rb
      - bin/rules-ctl generate-routes --integration notification_router examples/services/checkout.rb
    generated_outputs:
      - deterministic provider manifests
      - SLO definitions
      - burn-rate alert context
      - missing-telemetry alerts
      - dashboard manifests
      - route catalog entries
    gaps:
      - Elastic provider generation requires a future sre-rules provider or observability-engineering handoff.
      - Terraform generation remains delegated to observability-engineering.
  ProviderGenerationHandoff:
    skill: observability-engineering
    contract: ReliabilityProviderHandoff
    source_reliability_artifacts:
      - SliSloDefinition
      - ReliabilityRecommendationSet
      - ResilienceExperimentPlan
    provider_targets:
      - datadog
      - elastic
    generated_outputs:
      - terraform observability resources
      - terraform SLO resources
      - provider validation commands
    owned_by_reliability:
      - SLI semantics
      - SLO objective and window
      - error-budget and miss-policy intent
      - resilience experiment evidence needs
    delegated_to_observability:
      - Terraform resource mapping
      - provider query syntax
      - dashboards and monitor bindings
      - provider validation commands
    rules:
      reliability_model_is_source_intent: true
      observability_engineering_generates_backend_artifacts: true
      reliability_engineering_does_not_generate_provider_terraform: true
      unsupported_provider_capabilities_are_reported_as_gaps: true
    safety:
      blast_radius: generated provider files only until Terraform plan is reviewed
      rollback_path: revert generated provider commit and restore prior Terraform state if applied
  VerificationEvidence:
    target: checkout-api reliability packet
    command: ./scripts/run-exercise.sh
    output_path: tests/scenarios/checkout-reliability.actual.yaml
    rollback_path: revert this repository commit and reinstall the previous skill copy
